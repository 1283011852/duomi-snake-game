<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐱 猫咪贪吃蛇 - Cat Snake Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --bg: #FFF5EE;
  --card: #FFFFFF;
  --primary: #FF9CAA;
  --secondary: #FFB347;
  --accent: #87CEEB;
  --text: #5D4E37;
  --text-light: #8B7355;
  --shadow: 0 4px 15px rgba(0,0,0,0.08);
  --pink-light: #FFF0F3;
  --gold: #FFD700;
  --green: #98D8C8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  overflow-y: auto;
  padding: 10px;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.game-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 620px;
}

/* ===== Header Panel ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 10px;
  flex-wrap: wrap;
}

.title-area {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-emoji {
  font-size: 32px;
  animation: bounce 1s ease-in-out infinite;
  image-rendering: pixelated;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.title-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.4;
}

.title-text .name {
  color: #E8836B;
  font-size: 18px;
}

.score-panel {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.score-card {
  background: var(--card);
  border: 3px solid #FFE4E1;
  border-radius: 12px;
  padding: 8px 14px;
  text-align: center;
  box-shadow: var(--shadow);
  min-width: 70px;
}

.score-label {
  font-size: 7px;
  color: var(--text-light);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.score-value {
  font-size: 16px;
  color: var(--text);
}

.score-value.combo {
  color: #FF6B6B;
  font-size: 12px;
}

/* ===== Canvas Container ===== */
.canvas-container {
  position: relative;
  background: var(--card);
  border: 4px solid #FFE4E1;
  border-radius: 20px;
  box-shadow: var(--shadow), 0 0 0 8px rgba(255,156,170,0.1);
  overflow: hidden;
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1;
}

.canvas-container.paused-blur canvas {
  filter: blur(4px) brightness(0.7);
  transition: filter 0.2s;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  transition: filter 0.2s;
  touch-action: none;
}

/* ===== Overlays ===== */
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255,245,238,0.92);
  transition: opacity 0.3s;
  z-index: 10;
  border-radius: 16px;
  overflow-y: auto;
  padding: 10px;
}

.hidden { display: none !important; }

.overlay-title {
  font-size: 20px;
  color: #E8836B;
  margin: 8px 0;
  text-shadow: 2px 2px 0 #FFE4E1;
}

.overlay-subtitle {
  font-size: 9px;
  color: var(--text-light);
  margin: 4px 0 16px;
  line-height: 1.6;
  text-align: center;
}

/* Cat logo */
.cat-logo {
  width: 120px;
  height: 120px;
  image-rendering: pixelated;
  margin-bottom: 8px;
}

/* Buttons */
.btn {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 11px;
  padding: 12px 28px;
  border: 3px solid;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
  outline: none;
  position: relative;
}

.btn-primary {
  background: #FF9CAA;
  color: #FFF;
  border-color: #E8836B;
  box-shadow: 0 4px 0 #E8836B;
}

.btn-primary:hover {
  background: #FFAAB8;
  transform: translateY(-1px);
  box-shadow: 0 5px 0 #E8836B;
}

.btn-primary:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #E8836B;
}

.btn-secondary {
  background: #FFF;
  color: var(--text);
  border-color: #FFE4E1;
  font-size: 9px;
  padding: 8px 18px;
}

.btn-secondary:hover {
  background: var(--pink-light);
}

.btn-small {
  font-size: 7px;
  padding: 6px 12px;
  border-radius: 8px;
}

/* ===== Game Over specific ===== */
.final-score {
  font-size: 28px;
  color: #E8836B;
  margin: 8px 0;
}

.new-record {
  font-size: 10px;
  color: #FFD700;
  animation: sparkle 0.5s ease-in-out infinite alternate;
  margin: 4px 0 12px;
}

@keyframes sparkle {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0.7; transform: scale(1.05); }
}

/* ===== Cat Selection ===== */
.cat-select-label {
  font-size: 9px;
  color: var(--text-light);
  margin: 6px 0 10px;
  letter-spacing: 2px;
}

.cat-select-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.cat-card {
  background: var(--card);
  border: 3px solid #FFE4E1;
  border-radius: 14px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  min-width: 105px;
}

.cat-card:hover {
  border-color: #FFB6C1;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255,156,170,0.25);
}

.cat-card.selected {
  border-color: #FF9CAA;
  background: #FFF5F7;
  box-shadow: 0 0 0 3px rgba(255,156,170,0.2);
}

.cat-preview {
  display: block;
  margin: 0 auto 4px;
  image-rendering: pixelated;
  border-radius: 8px;
}

.cat-card-name {
  font-size: 9px;
  color: var(--text);
  margin-bottom: 2px;
}

.cat-card-desc {
  font-size: 6px;
  color: var(--text-light);
  line-height: 1.3;
}

/* ===== Name Input ===== */
.name-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.name-label {
  font-size: 8px;
  color: var(--text);
}

.name-input {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 10px;
  padding: 8px 12px;
  border: 3px solid #FFE4E1;
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  text-align: center;
  width: 160px;
  outline: none;
  transition: border-color 0.2s;
}

.name-input:focus {
  border-color: #FF9CAA;
}

/* ===== Ranking info ===== */
.rank-info {
  font-size: 8px;
  color: var(--text);
  line-height: 1.8;
  margin: 6px 0 12px;
  text-align: center;
}

.rank-highlight {
  color: #FF9CAA;
  font-size: 10px;
}

/* ===== Button row ===== */
.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ===== Pause overlay ===== */
#pauseOverlay {
  z-index: 20;
}

/* ===== Controls Hint ===== */
.controls-hint {
  font-size: 7px;
  color: var(--text-light);
  text-align: center;
  padding: 4px 0;
  letter-spacing: 0.5px;
}

.controls-hint kbd {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 7px;
  background: var(--card);
  border: 2px solid #FFE4E1;
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--text);
}

/* ===== Mobile Controls ===== */
.mobile-controls {
  display: none;
  width: 100%;
  max-width: 400px;
}

.dpad {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 4px;
  width: 180px;
  height: 180px;
  margin: 0 auto;
}

.dpad-btn {
  background: var(--card);
  border: 2px solid #FFE4E1;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

.dpad-btn:active {
  background: #FFE4E1;
  transform: scale(0.92);
}

.dpad-empty { border: none; background: transparent; }

.dpad-up { grid-column: 2; grid-row: 1; }
.dpad-left { grid-column: 1; grid-row: 2; }
.dpad-center { grid-column: 2; grid-row: 2; font-size: 10px; border-style: dashed; }
.dpad-right { grid-column: 3; grid-row: 2; }
.dpad-down { grid-column: 2; grid-row: 3; }

/* ===== Combo indicator ===== */
.combo-pop {
  position: absolute;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #FF6B6B;
  pointer-events: none;
  animation: comboUp 0.8s ease-out forwards;
  z-index: 5;
}

@keyframes comboUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  body { padding: 4px; }
  .game-wrapper { max-width: 100%; gap: 6px; }
  .canvas-container { max-width: 100%; border-radius: 14px; border-width: 3px; }
  .header { flex-direction: column; gap: 6px; }
  .title-text { font-size: 9px; }
  .title-text .name { font-size: 13px; }
  .title-emoji { font-size: 22px; }
  .score-panel { gap: 6px; }
  .score-card { padding: 5px 8px; min-width: 48px; }
  .score-label { font-size: 5px; }
  .score-value { font-size: 11px; }
  .overlay { padding: 6px; }
  .overlay-title { font-size: 14px; margin: 4px 0; }
  .overlay-subtitle { font-size: 6px; }
  .btn { font-size: 8px; padding: 8px 16px; }
  .btn-small { font-size: 6px; padding: 5px 10px; }
  .mobile-controls { display: block; }
  .final-score { font-size: 22px; }
  .cat-logo { width: 70px; height: 70px; }
  .cat-select-row { gap: 5px; margin-bottom: 8px; }
  .cat-card { min-width: 75px; padding: 6px 8px; border-width: 2px; }
  .cat-card-name { font-size: 7px; }
  .cat-card-desc { font-size: 5px; }
  .cat-preview { width: 60px; height: 60px; }
  .name-label { font-size: 7px; }
  .name-input { font-size: 8px; padding: 6px 10px; width: 130px; }
  .controls-hint { font-size: 6px; }
  .controls-hint kbd { font-size: 6px; }
  .dpad { width: 150px; height: 150px; gap: 3px; }
  .dpad-btn { font-size: 16px; border-radius: 8px; }
  .cat-select-label { font-size: 7px; margin: 4px 0 6px; }
}
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- Header -->
  <div class="header">
    <div class="title-area">
      <span class="title-emoji">🐱</span>
      <span class="title-text">
        <span class="name">哆咪</span>の<br>贪吃蛇
      </span>
    </div>
    <div class="score-panel">
      <div class="score-card">
        <div class="score-label">🍥 分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-card">
        <div class="score-label">⭐ 等级</div>
        <div class="score-value" id="level">1</div>
      </div>
      <div class="score-card">
        <div class="score-label">🏆 最高</div>
        <div class="score-value" id="highScore">0</div>
      </div>
      <div class="score-card" id="comboCard" style="display:none;">
        <div class="score-label">🔥 连击</div>
        <div class="score-value combo" id="comboCount">x1</div>
      </div>
      <button class="btn btn-small btn-secondary" id="pauseBtn" onclick="togglePause()" title="暂停/继续 (空格键)">
        ⏯ 暂停
      </button>
      <button class="btn btn-small btn-secondary" id="musicBtn" onclick="toggleMusic()" title="背景音乐 开/关">
        🎵 音乐
      </button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
      <canvas class="cat-logo" id="catLogo" width="120" height="120"></canvas>
      <div class="overlay-title" id="startTitle">🐱 猫咪贪吃蛇</div>

      <!-- Cat Selection -->
      <div class="cat-select-label">— 选择你的猫咪 —</div>
      <div class="cat-select-row">
        <div class="cat-card selected" id="catCardTabby" onclick="selectCat('tabby')">
          <canvas class="cat-preview" id="previewTabby" width="100" height="100"></canvas>
          <div class="cat-card-name">🐱 狸花猫</div>
          <div class="cat-card-desc">虎斑花纹·灵动敏捷</div>
        </div>
        <div class="cat-card" id="catCardOrange" onclick="selectCat('orange')">
          <canvas class="cat-preview" id="previewOrange" width="100" height="100"></canvas>
          <div class="cat-card-name">🐈 橘猫</div>
          <div class="cat-card-desc">十橘九胖·吃货担当</div>
        </div>
        <div class="cat-card" id="catCardCalico" onclick="selectCat('calico')">
          <canvas class="cat-preview" id="previewCalico" width="100" height="100"></canvas>
          <div class="cat-card-name">😺 三花猫</div>
          <div class="cat-card-desc">白底花斑·温柔可爱</div>
        </div>
      </div>

      <!-- Name Input -->
      <div class="name-input-row">
        <label class="name-label">给猫咪起个名字：</label>
        <input type="text" class="name-input" id="catNameInput"
               value="哆咪" maxlength="8" placeholder="输入名字…">
      </div>

      <button class="btn btn-primary" onclick="startGame()">
        🎮 开始游戏
      </button>
      <div class="overlay-subtitle">
        🐟 小鱼干 +10 &nbsp; 🥫 猫罐头 +20<br>
        ⭐ 金色鱼 +30 &nbsp; 🌿 猫薄荷 +50
      </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
      <div style="font-size:36px;">😿</div>
      <div class="overlay-title">游戏结束</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="new-record hidden" id="newRecord">🎉 新纪录！</div>
      <div class="overlay-subtitle" id="gameOverStats"></div>
      <!-- Ranking info -->
      <div class="rank-info" id="rankInfo"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startGame()">🔄 重新开始</button>
        <button class="btn btn-secondary" onclick="goToMenu()">🏠 返回主菜单</button>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div class="overlay hidden" id="pauseOverlay">
      <div style="font-size:40px;">⏸</div>
      <div class="overlay-title">暂停中</div>
      <div class="overlay-subtitle">休息一下，猫咪在等你~</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="togglePause()">▶ 继续游戏</button>
        <button class="btn btn-secondary" onclick="goToMenu()">🏠 返回主菜单</button>
      </div>
    </div>
  </div>

  <!-- Controls Hint -->
  <div class="controls-hint" id="controlsHint">
    ⌨️ 方向键/WASD 移动 &nbsp;|&nbsp; <kbd>空格</kbd> 暂停
  </div>

  <!-- Mobile D-Pad -->
  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <button class="dpad-btn dpad-up"    id="dpadUp">▲</button>
      <button class="dpad-btn dpad-left"  id="dpadLeft">◀</button>
      <button class="dpad-btn dpad-center" id="dpadPause">⏯</button>
      <button class="dpad-btn dpad-right" id="dpadRight">▶</button>
      <button class="dpad-btn dpad-down"  id="dpadDown">▼</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
  COLS: 20,
  ROWS: 20,
  CELL: 30,        // base cell size in px (canvas = COLS*CELL)
  BASE_SPEED: 130, // ms per tick at level 1
  MIN_SPEED: 55,   // fastest tick
  SPEED_DECAY: 5,  // ms faster per level
  COMBO_WINDOW: 2500, // ms to maintain combo
  MAX_COMBO: 5,
  FOOD_TYPES: {
    fish:    { name: '小鱼干', points: 10, color: '#87CEEB', weight: 70, life: Infinity },
    can:     { name: '猫罐头', points: 20, color: '#FFB347', weight: 20, life: 8000 },
    goldfish:{ name: '金色鱼', points: 30, color: '#FFD700', weight: 7,  life: 6000, speedBoost: 3000 },
    catnip:  { name: '猫薄荷', points: 50, color: '#98D8C8', weight: 3,  life: 5000, invincible: 3000 },
  },
  PARTICLE_COUNT: 12,
};

// ============================================================
//  CAT TYPES
// ============================================================
const CAT_TYPES = {
  tabby: {
    id: 'tabby',
    name: '狸花猫',
    emoji: '🐱',
    desc: '虎斑花纹·灵动敏捷',
    earOuter: '#8B7355',
    earInner: '#FFB6C1',
    headBase: '#C4A882',
    headAccent: '#A0896E',
    stripe: '#6B5B4F',
    cheek: '#D4C4A8',
    eyeColor: '#7BC8A4',
    bodyA: '#C4A882',
    bodyB: '#B89B72',
    bodyStripe: '#8B7355',
  },
  orange: {
    id: 'orange',
    name: '橘猫',
    emoji: '🐈',
    desc: '十橘九胖·吃货担当',
    earOuter: '#E8913A',
    earInner: '#FFB6C1',
    headBase: '#F4A460',
    headAccent: '#F0C078',
    stripe: '#D4782A',
    cheek: '#F5D5A0',
    eyeColor: '#C9A84C',
    bodyA: '#F4A460',
    bodyB: '#E8913A',
    bodyStripe: '#D4782A',
  },
  calico: {
    id: 'calico',
    name: '三花猫',
    emoji: '😺',
    desc: '白底花斑·温柔可爱',
    earOuter: '#3A3A3A',
    earInner: '#FFB6C1',
    headBase: '#FFFEF5',
    headAccent: '#F4A460',
    stripe: '#3A3A3A',
    cheek: '#F5D5A0',
    eyeColor: '#7BC8A4',
    bodyA: '#FFFEF5',
    bodyB: '#F4A460',
    bodyStripe: '#3A3A3A',
  },
};

// ============================================================
//  DOM REFS
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const pauseOverlay = document.getElementById('pauseOverlay');
const mobileControls = document.getElementById('mobileControls');

// ============================================================
//  AUDIO SYSTEM (Web Audio API)
// ============================================================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBeep(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { /* ignore audio errors */ }
}

function sfxEat() {
  playBeep(880, 0.08, 'square', 0.06);
  setTimeout(() => playBeep(1100, 0.06, 'square', 0.05), 60);
}

function sfxSpecial() {
  playBeep(660, 0.06, 'square', 0.05);
  setTimeout(() => playBeep(880, 0.06, 'square', 0.05), 70);
  setTimeout(() => playBeep(1100, 0.08, 'square', 0.06), 140);
}

function sfxLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.12, 'triangle', 0.07), i * 80);
  });
}

function sfxGameOver() {
  playBeep(220, 0.2, 'sawtooth', 0.06);
  setTimeout(() => playBeep(165, 0.3, 'sawtooth', 0.06), 150);
  setTimeout(() => playBeep(110, 0.4, 'sawtooth', 0.06), 350);
}

// ============================================================
//  BACKGROUND MUSIC SYSTEM
// ============================================================
// Cheerful pentatonic melody (C D E G A) — cute & bouncy ~138 BPM
const BGM_NOTES = [
  [329.63,180],[392.00,180],[523.25,360],[0,120],   // E4 G4 C5 ·
  [329.63,180],[392.00,180],[523.25,360],[0,120],   // E4 G4 C5 ·

let bgmPlayer = {
  active: false,
  noteIndex: 0,
  timerId: null,
  osc: null,
  gainNode: null,
  filterNode: null,

  playNote(freq, durationMs) {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const dur = durationMs / 1000;
      // Soft attack/release envelope via gain
      this.gainNode.gain.cancelScheduledValues(now);
      this.gainNode.gain.setValueAtTime(0, now);
      this.gainNode.gain.linearRampToValueAtTime(0.06, now + 0.02);
      this.gainNode.gain.setValueAtTime(0.06, now + dur - 0.03);
      this.gainNode.gain.linearRampToValueAtTime(0, now + dur);

      this.osc.frequency.setValueAtTime(freq, now);
    } catch(e) { /* ignore */ }
  },

  scheduleNext() {
    if (!this.active) return;
    const note = BGM_NOTES[this.noteIndex];
    const [freq, dur] = note;
    if (freq > 0) {
      this.playNote(freq, dur);
    }
    this.noteIndex = (this.noteIndex + 1) % BGM_NOTES.length;
    this.timerId = setTimeout(() => this.scheduleNext(), dur);
  },

  start() {
    if (this.active) return;
    if (!audioCtx) initAudio();
    if (!audioCtx) return;

    // Create audio nodes
    this.filterNode = audioCtx.createBiquadFilter();
    this.filterNode.type = 'lowpass';
    this.filterNode.frequency.setValueAtTime(2000, audioCtx.currentTime);
    this.filterNode.Q.setValueAtTime(0.7, audioCtx.currentTime);

    this.gainNode = audioCtx.createGain();
    this.gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);

    this.osc = audioCtx.createOscillator();
    this.osc.type = 'triangle';
    this.osc.frequency.setValueAtTime(440, audioCtx.currentTime);

    this.osc.connect(this.filterNode);
    this.filterNode.connect(this.gainNode);
    this.gainNode.connect(audioCtx.destination);

    this.osc.start();

    this.active = true;
    this.noteIndex = 0;
    this.scheduleNext();
  },

  stop() {
    this.active = false;
    if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    if (this.osc) {
      try { this.osc.stop(); } catch(e) {}
      try { this.osc.disconnect(); } catch(e) {}
      this.osc = null;
    }
    if (this.gainNode) { try { this.gainNode.disconnect(); } catch(e) {} this.gainNode = null; }
    if (this.filterNode) { try { this.filterNode.disconnect(); } catch(e) {} this.filterNode = null; }
  },

  pause() {
    // Stop scheduling new notes but keep audio nodes alive (suspended)
    this.active = false;
    if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    // Mute the gain
    if (this.gainNode && audioCtx) {
      try { this.gainNode.gain.setValueAtTime(0, audioCtx.currentTime); } catch(e) {}
    }
  },

  resume() {
    if (this.active) return;
    this.active = true;
    this.noteIndex = 0;
    this.scheduleNext();
  }
};

function drawPixelCatFace(targetCtx, size, blinkFrame, catTypeId) {

  const s = size;

  targetCtx.clearRect(0, 0, s, s);

  // Ears (outer)
  targetCtx.fillStyle = ct.earOuter;
  targetCtx.fillRect(2*p, 0, 4*p, 6*p);
  targetCtx.fillRect(1*p, 1*p, 6*p, 5*p);
  targetCtx.fillRect(14*p, 0, 4*p, 6*p);
  targetCtx.fillRect(13*p, 1*p, 6*p, 5*p);

  // Ears (inner pink)
  targetCtx.fillStyle = ct.earInner;
  targetCtx.fillRect(3*p, 2*p, 2*p, 3*p);
  targetCtx.fillRect(15*p, 2*p, 2*p, 3*p);

  // Head main shape
  targetCtx.fillStyle = ct.headBase;
  targetCtx.fillRect(2*p, 5*p, 16*p, 13*p);
  targetCtx.fillRect(1*p, 6*p, 18*p, 11*p);
  targetCtx.fillRect(0*p, 7*p, 20*p, 9*p);

  // Calico patches
  if (catTypeId === 'calico') {
    targetCtx.fillStyle = '#F4A460';
    targetCtx.fillRect(12*p, 5*p, 6*p, 4*p);
    targetCtx.fillRect(3*p, 10*p, 5*p, 5*p);
    targetCtx.fillStyle = '#3A3A3A';
    targetCtx.fillRect(2*p, 5*p, 4*p, 4*p);
    targetCtx.fillRect(13*p, 12*p, 5*p, 4*p);
  }

  // Tabby stripes on forehead (tabby & orange)
  if (catTypeId === 'tabby' || catTypeId === 'orange') {
    targetCtx.fillStyle = ct.stripe;
    targetCtx.fillRect(7*p, 5*p, 2*p, 3*p);
    targetCtx.fillRect(11*p, 5*p, 2*p, 3*p);
    targetCtx.fillRect(9*p, 6*p, 2*p, 2*p);
  }

  targetCtx.fillStyle = ct.cheek;
  targetCtx.fillRect(0*p, 8*p, 2*p, 5*p);
  targetCtx.fillRect(18*p, 8*p, 2*p, 5*p);

  // Eyes
  const eyeY = 9*p;

  targetCtx.fillStyle = '#FFF';
  targetCtx.fillRect(4*p, eyeY, 5*p, blinkH);

    targetCtx.fillRect(12*p, eyeY+1*p, 3*p, 3*p);
    targetCtx.fillStyle = '#1A1A2E';
    targetCtx.fillRect(6*p, eyeY+2*p, 1*p, 1*p);
    targetCtx.fillRect(13*p, eyeY+2*p, 1*p, 1*p);
    targetCtx.fillStyle = '#FFF';
    targetCtx.fillRect(5*p, eyeY+1*p, 1*p, 1*p);
    targetCtx.fillRect(12*p, eyeY+1*p, 1*p, 1*p);
  }

  // Nose
  targetCtx.fillStyle = '#FF8989';
  targetCtx.fillRect(9*p, 13*p, 2*p, 2*p);

  // Mouth
  targetCtx.fillStyle = '#8B5E3C';
  targetCtx.fillRect(7*p, 15*p, 2*p, 1*p);
  targetCtx.fillRect(11*p, 15*p, 2*p, 1*p);
  targetCtx.fillRect(8*p, 16*p, 4*p, 1*p);

  // Whiskers
  targetCtx.fillStyle = '#FFFEF5';
  targetCtx.fillRect(0*p, 12*p, 4*p, 1*p);
  targetCtx.fillRect(0*p, 14*p, 4*p, 1*p);
  targetCtx.fillRect(16*p, 12*p, 4*p, 1*p);
  targetCtx.fillRect(16*p, 14*p, 4*p, 1*p);

  // Blush
  targetCtx.fillStyle = 'rgba(255,182,193,0.5)';
  targetCtx.fillRect(2*p, 14*p, 3*p, 2*p);
  targetCtx.fillRect(15*p, 14*p, 3*p, 2*p);
}

let cellSize, canvasW, canvasH;

function resizeCanvas() {
  const rect = container.getBoundingClientRect();
  const maxSize = Math.min(rect.width, rect.height || 600, 600);
  cellSize = Math.floor(maxSize / CONFIG.COLS);
  canvasW = cellSize * CONFIG.COLS;
  canvasH = cellSize * CONFIG.ROWS;
  canvas.width = canvasW;
  canvas.height = canvasH;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
}

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 2 + Math.random() * 4;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.04,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  state.particles = state.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    return p.life > 0;
  });
}

function drawParticles(ctx) {
  for (const p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

//  GAME LOGIC
// ============================================================
function initSnake() {
  const cx = Math.floor(CONFIG.COLS / 2);
  const cy = Math.floor(CONFIG.ROWS / 2);
  state.snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  state.direction = 'right';
  state.nextDirection = 'right';
}

function getFoodType() {
  const rand = Math.random() * 100;
  let cumulative = 0;
  for (const [key, ft] of Object.entries(CONFIG.FOOD_TYPES)) {
    cumulative += ft.weight;
    if (rand <= cumulative) return key;
  }
  return 'fish';
}

function randomFoodPos() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * CONFIG.COLS),
      y: Math.floor(Math.random() * CONFIG.ROWS),
    };
  } while (state.snake.some(s => s.x === pos.x && s.y === pos.y) ||
           (state.specialFood && state.specialFood.x === pos.x && state.specialFood.y === pos.y) ||
           (state.food && state.food.x === pos.x && state.food.y === pos.y));
  return pos;
}

function spawnFood() {
  const type = getFoodType();
  const ft = CONFIG.FOOD_TYPES[type];
  const food = {
    ...randomFoodPos(),
    type,
    points: ft.points,
    color: ft.color,
    life: ft.life,
    spawnTime: performance.now(),
    speedBoost: ft.speedBoost || 0,
    invincible: ft.invincible || 0,
  };

  if (type === 'fish') {
    state.food = food;
  } else {
    state.specialFood = food;
  }
}

function resetGame() {
  initSnake();
  state.food = null;
  state.specialFood = null;
  state.score = 0;
  state.level = 1;
  state.comboCount = 0;
  state.lastEatTime = 0;

// ============================================================
//  LEADERBOARD SYSTEM
// ============================================================
const LB_KEY = 'duomiSnakeLeaderboard';
const LB_MAX = 20;

function loadLeaderboard() {
  try {
    const raw = localStorage.getItem(LB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveScore(entry) {
  const lb = loadLeaderboard();
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  const trimmed = lb.slice(0, LB_MAX);
  try { localStorage.setItem(LB_KEY, JSON.stringify(trimmed)); } catch(e) {}
  return trimmed;
}

function getRankAndGap(score, lb) {
  // Find rank (1-indexed), total entries, gap to next higher score
  let rank = 1;
  for (const entry of lb) {
    if (entry.score > score) rank++;
    else break;
  }
  const total = lb.length;
  const prevScore = rank > 1 ? lb[rank - 2].score : null;
  const gap = prevScore !== null ? prevScore - score : 0;
  const nextScore = rank <= total && lb[rank - 1] && lb[rank - 1].score === score ? null : (rank <= total ? lb[rank - 1]?.score : null);
  return { rank, total, gap, isTop: rank === 1 && score > 0 };
}

function gameOver() {
  state.gameState = 'over';
  sfxGameOver();
  bgmPlayer.stop();

  const ct = CAT_TYPES[state.catType] || CAT_TYPES['tabby'];
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // Save to leaderboard
  const entry = {
    score: state.score,
    name: state.catName,
    catType: state.catType,
    catName: ct.name,
    date: dateStr,
    food: state.foodEaten,
    level: state.level,
    combo: state.maxComboReached,
  };
  const lb = saveScore(entry);
  const { rank, total, gap, isTop } = getRankAndGap(state.score, lb);

  // Update high score
  const isNew = state.score > state.highScore;
  if (isNew) {
    state.highScore = state.score;
    try { localStorage.setItem('duomiSnakeHighScore', state.highScore); } catch(e) {}
  }

  // Update UI
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('newRecord').classList.toggle('hidden', !isNew);

  document.getElementById('gameOverStats').innerHTML =
    `${ct.emoji} ${state.catName}（${ct.name}）<br>` +
    `🍥 吃了 ${state.foodEaten} 个食物 &nbsp; ⭐ Lv.${state.level}<br>` +
    `🔥 最大连击 x${state.maxComboReached}`;

  // Ranking info
  const rankEl = document.getElementById('rankInfo');
  let rankHTML = '';
  if (isTop) {
    rankHTML += '<div class="rank-highlight">👑 恭喜！你是第一名！</div>';
  }
  rankHTML += `🏆 历史最高分：<b>${lb.length > 0 ? lb[0].score : state.score}</b>`;
  rankHTML += `<br>📊 当前排名：第 <b>${rank}</b> 名 / 共 ${total} 条记录`;
  if (gap > 0) {
    rankHTML += `<br>📈 距离上一名还差 <b>${gap}</b> 分`;
  } else if (!isTop && gap === 0) {
    rankHTML += `<br>🤝 与上一名分数相同！`;
  }
  rankEl.innerHTML = rankHTML;

  document.getElementById('highScore').textContent = state.highScore;
  gameOverScreen.classList.remove('hidden');
}

// Return to main menu
function goToMenu() {
  bgmPlayer.stop();
  state.gameState = 'start';
  pauseOverlay.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  container.classList.remove('paused-blur');
  startScreen.classList.remove('hidden');
  updatePauseBtn('⏯ 暂停');
  updateMusicBtn(state.musicOn ? 'on' : 'off');
  resetGame();
  renderCatLogo(state.catType);
}

function getTickSpeed() {
  const base = CONFIG.BASE_SPEED - (state.level - 1) * CONFIG.SPEED_DECAY;
  const boosted = state.speedBoostUntil > performance.now() ? base * 0.6 : base;
  return Math.max(CONFIG.MIN_SPEED, boosted);
}

function update() {
  const now = performance.now();

  // Check special food expiry
  if (state.specialFood && now - state.specialFood.spawnTime > state.specialFood.life) {
    state.specialFood = null;
  }

  // Tick timer
  state.tickTimer += now - state.lastTick;
  state.lastTick = now;

  const tickSpeed = getTickSpeed();
  if (state.tickTimer < tickSpeed) return;
  state.tickTimer -= tickSpeed;

  // Apply buffered direction
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (state.nextDirection !== opposites[state.direction]) {
    state.direction = state.nextDirection;
  }

  // Move head
  const head = state.snake[0];
  const newHead = { ...head };
  switch (state.direction) {
    case 'up':    newHead.y--; break;
    case 'down':  newHead.y++; break;
    case 'left':  newHead.x--; break;
    case 'right': newHead.x++; break;
  }

  // Wall collision (with invincibility check)
  const invincible = state.invincibleUntil > now;
  if (!invincible && (newHead.x < 0 || newHead.x >= CONFIG.COLS || newHead.y < 0 || newHead.y >= CONFIG.ROWS)) {
    gameOver();
    return;
  }
  // Wrap around if invincible
  if (invincible) {
    if (newHead.x < 0) newHead.x = CONFIG.COLS - 1;
    if (newHead.x >= CONFIG.COLS) newHead.x = 0;
    if (newHead.y < 0) newHead.y = CONFIG.ROWS - 1;
    if (newHead.y >= CONFIG.ROWS) newHead.y = 0;
  }

  // Self collision
  const selfCollision = state.snake.some((s, i) => i > 0 && s.x === newHead.x && s.y === newHead.y);
  if (!invincible && selfCollision) {
    gameOver();
    return;
  }

  // Add new head
  state.snake.unshift(newHead);

  // Check food collision
  let ate = false;
  let ateType = null;
  let atePoints = 0;
  let ateSpecial = null;

  if (state.food && newHead.x === state.food.x && newHead.y === state.food.y) {
    ate = true;
    ateType = state.food.type;
    atePoints = state.food.points;
    spawnParticles(
      state.food.x * cellSize + cellSize/2,
      state.food.y * cellSize + cellSize/2,
      state.food.color,
      CONFIG.PARTICLE_COUNT
    );
    state.food = null;
  } else if (state.specialFood && newHead.x === state.specialFood.x && newHead.y === state.specialFood.y) {
    ate = true;
    ateType = state.specialFood.type;
    atePoints = state.specialFood.points;
    ateSpecial = state.specialFood;
    spawnParticles(
      state.specialFood.x * cellSize + cellSize/2,
      state.specialFood.y * cellSize + cellSize/2,
      state.specialFood.color,
      CONFIG.PARTICLE_COUNT * 1.5
    );
    state.specialFood = null;
  }

  if (ate) {
    // Combo system
    const nowMs = performance.now();
    if (nowMs - state.lastEatTime < CONFIG.COMBO_WINDOW) {
      state.comboCount = Math.min(state.comboCount + 1, CONFIG.MAX_COMBO);
    } else {
      state.comboCount = 1;
    }
    state.lastEatTime = nowMs;
    if (state.comboCount > state.maxComboReached) {
      state.maxComboReached = state.comboCount;
    }

    // Combo multiplier
    const multiplier = 1 + (state.comboCount - 1) * 0.5;
    const finalPoints = Math.floor(atePoints * multiplier);

    state.score += finalPoints;
    state.foodEaten++;

    // Level up
    const newLevel = Math.floor(state.score / 100) + 1;
    if (newLevel > state.level) {
      state.level = newLevel;
      sfxLevelUp();
    }

    // Special effects
    if (ateSpecial) {
      sfxSpecial();
      if (ateSpecial.speedBoost) {
        state.speedBoostUntil = performance.now() + ateSpecial.speedBoost;
      }
      if (ateSpecial.invincible) {
        state.invincibleUntil = performance.now() + ateSpecial.invincible;
      }
      showComboPop(`+${finalPoints} ${ateType === 'goldfish' ? '⭐' : '🌿'}`);
    } else {
      sfxEat();
      if (state.comboCount > 1) {
        showComboPop(`x${multiplier.toFixed(1)} 🔥`);
      }
    }

    // Spawn new food
    spawnFood();
    updateScoreDisplay();
  } else {
    // Remove tail (no growth)
    state.snake.pop();
  }

  // Decay combo
  if (performance.now() - state.lastEatTime > CONFIG.COMBO_WINDOW) {
    state.comboCount = 0;
  }
}

// ============================================================
//  COMBO POPUP
// ============================================================
function showComboPop(text) {
  const el = document.createElement('div');
  el.className = 'combo-pop';
  el.textContent = text;
  el.style.left = '50%';
  el.style.top = '40%';
  el.style.transform = 'translate(-50%, -50%)';
  container.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ============================================================
//  UI UPDATES
// ============================================================
function updateScoreDisplay() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('level').textContent = state.level;
  document.getElementById('highScore').textContent = state.highScore;
  const comboCard = document.getElementById('comboCard');
  if (state.comboCount > 1) {
    comboCard.style.display = '';
    document.getElementById('comboCount').textContent = `x${(1 + (state.comboCount-1)*0.5).toFixed(1)}`;
  } else {
    comboCard.style.display = 'none';
  }
}

// ============================================================
//  RENDERING
// ============================================================
function drawGrid() {
  ctx.fillStyle = '#FFFAF5';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,228,225,0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= CONFIG.COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * cellSize, 0);
    ctx.lineTo(x * cellSize, canvasH);
    ctx.stroke();
  }
  for (let y = 0; y <= CONFIG.ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * cellSize);
    ctx.lineTo(canvasW, y * cellSize);
    ctx.stroke();
  }
}

function drawSnakeBody(ctx, x, y, index, total) {
  const ct = CAT_TYPES[state.catType] || CAT_TYPES['tabby'];
  const s = cellSize;
  const p = Math.floor(s / 8);

  // Alternating body pattern
  const stripe = index % 3 === 0;
  ctx.fillStyle = stripe ? ct.bodyA : ct.bodyB;
  ctx.fillRect(x * s + p, y * s + p, s - 2*p, s - 2*p);

  // Darker marks on striped segments
  if (stripe) {
    ctx.fillStyle = ct.bodyStripe;
    ctx.fillRect(x * s + 3*p, y * s + 2*p, 2*p, 1*p);
    ctx.fillRect(x * s + 3*p, y * s + s - 3*p, 2*p, 1*p);
  }

  // Paw print on every 4th segment
  if (index > 0 && index % 4 === 0) {
    ctx.fillStyle = 'rgba(255,182,193,0.35)';
    ctx.fillRect(x * s + 2*p, y * s + 2*p, 1*p, 1*p);
    ctx.fillRect(x * s + 5*p, y * s + 2*p, 1*p, 1*p);
    ctx.fillRect(x * s + 3*p, y * s + 4*p, 2*p, 1*p);
  }

  // Tail tip (last segment)
  if (index === total - 1 && total > 1) {
    ctx.fillStyle = ct.cheek;
    ctx.fillRect(x * s + 2*p, y * s + 2*p, 4*p, 2*p);
  }
}

function drawSnakeHead(ctx, x, y, dir) {
  const ct = CAT_TYPES[state.catType] || CAT_TYPES['tabby'];
  const s = cellSize;
  const cx = x * s + s / 2;
  const cy = y * s + s / 2;

  ctx.save();
  ctx.translate(cx, cy);

  // Rotate based on direction
  const angles = { up: -Math.PI/2, right: 0, down: Math.PI/2, left: Math.PI };
  ctx.rotate(angles[dir] || 0);

  const hs = s * 0.9;
  const p = Math.floor(hs / 16);

  // Ears
  ctx.fillStyle = ct.earOuter;
  ctx.fillRect(-hs*0.35, -hs*0.45, hs*0.22, hs*0.28);
  ctx.fillRect(hs*0.13, -hs*0.45, hs*0.22, hs*0.28);
  // Inner ears
  ctx.fillStyle = ct.earInner;
  ctx.fillRect(-hs*0.28, -hs*0.38, hs*0.12, hs*0.18);
  ctx.fillRect(hs*0.16, -hs*0.38, hs*0.12, hs*0.18);

  // Head
  ctx.fillStyle = ct.headBase;
  ctx.fillRect(-hs*0.42, -hs*0.2, hs*0.84, hs*0.6);

  // Calico patches
  if (state.catType === 'calico') {
    ctx.fillStyle = '#F4A460';
    ctx.fillRect(-hs*0.1, -hs*0.2, hs*0.25, hs*0.18);
    ctx.fillRect(-hs*0.35, hs*0.1, hs*0.2, hs*0.22);
    ctx.fillStyle = '#3A3A3A';
    ctx.fillRect(-hs*0.42, -hs*0.2, hs*0.16, hs*0.18);
    ctx.fillRect(hs*0.15, hs*0.18, hs*0.22, hs*0.18);
  }

  // Cheek fluff
  ctx.fillStyle = ct.cheek;
  ctx.fillRect(-hs*0.48, -hs*0.05, hs*0.1, hs*0.25);
  ctx.fillRect(hs*0.38, -hs*0.05, hs*0.1, hs*0.25);

  // Forehead markings (tabby & orange)
  if (state.catType === 'tabby' || state.catType === 'orange') {
    ctx.fillStyle = ct.stripe;
    ctx.fillRect(-hs*0.15, -hs*0.2, hs*0.08, hs*0.14);
    ctx.fillRect(hs*0.07, -hs*0.2, hs*0.08, hs*0.14);
    ctx.fillRect(-hs*0.04, -hs*0.14, hs*0.08, hs*0.08);
  }

  // Eyes
  const blink = state.frameCount % 120 < 3;
  if (!blink) {
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-hs*0.3, -hs*0.02, hs*0.2, hs*0.2);
    ctx.fillRect(hs*0.1, -hs*0.02, hs*0.2, hs*0.2);
    ctx.fillStyle = ct.eyeColor;
    ctx.fillRect(-hs*0.25, hs*0.02, hs*0.14, hs*0.12);
    ctx.fillRect(hs*0.11, hs*0.02, hs*0.14, hs*0.12);
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(-hs*0.2, hs*0.05, hs*0.05, hs*0.05);
    ctx.fillRect(hs*0.15, hs*0.05, hs*0.05, hs*0.05);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-hs*0.24, hs*0.03, hs*0.04, hs*0.04);
    ctx.fillRect(hs*0.12, hs*0.03, hs*0.04, hs*0.04);
  } else {
    ctx.fillStyle = ct.stripe;
    ctx.fillRect(-hs*0.3, hs*0.06, hs*0.2, hs*0.02);
    ctx.fillRect(hs*0.1, hs*0.06, hs*0.2, hs*0.02);
  }

  // Nose
  ctx.fillStyle = '#FF8989';
  ctx.fillRect(-hs*0.03, hs*0.16, hs*0.06, hs*0.05);

  // Mouth
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(-hs*0.12, hs*0.24, hs*0.08, hs*0.03);
  ctx.fillRect(hs*0.04, hs*0.24, hs*0.08, hs*0.03);

  // Whiskers
  ctx.fillStyle = '#FFFEF5';
  ctx.fillRect(-hs*0.5, hs*0.1, hs*0.18, 1);
  ctx.fillRect(-hs*0.5, hs*0.18, hs*0.18, 1);
  ctx.fillRect(hs*0.32, hs*0.1, hs*0.18, 1);
  ctx.fillRect(hs*0.32, hs*0.18, hs*0.18, 1);

  // Blush
  ctx.fillStyle = 'rgba(255,182,193,0.4)';
  ctx.fillRect(-hs*0.38, hs*0.18, hs*0.1, hs*0.06);
  ctx.fillRect(hs*0.28, hs*0.18, hs*0.1, hs*0.06);

  ctx.restore();
}

function drawFoodItem(ctx, x, y, type) {
  const s = cellSize;
  const cx = x * s + s/2 - s*0.35;
  const cy = y * s + s/2 - s*0.35;
  const fs = s * 0.7;

  ctx.save();
  ctx.translate(cx, cy);

  // Pulsing animation
  const pulse = 1 + Math.sin(state.frameCount * 0.08) * 0.08;
  ctx.scale(pulse, pulse);

  switch (type) {
    case 'fish':
      drawPixelFish(ctx, fs, '#87CEEB');
      break;
    case 'can':
      drawPixelCan(ctx, fs);
      break;
    case 'goldfish':
      // Sparkle effect
      ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(state.frameCount * 0.15) * 0.2) + ')';
      ctx.fillRect(-fs*0.1, -fs*0.1, fs*1.2, fs*1.2);
      drawPixelGoldfish(ctx, fs);
      break;
    case 'catnip':
      drawPixelCatnip(ctx, fs);
      break;
  }
  ctx.restore();
}

function render() {
  drawGrid();

  // Draw food
  if (state.food) {
    drawFoodItem(ctx, state.food.x, state.food.y, state.food.type);
  }
  if (state.specialFood) {
    // Timed special food - flash when about to expire
    const remaining = state.specialFood.life - (performance.now() - state.specialFood.spawnTime);
    if (remaining > 1000 || Math.floor(performance.now() / 200) % 2 === 0) {
      drawFoodItem(ctx, state.specialFood.x, state.specialFood.y, state.specialFood.type);
    }
  }

  // Draw snake body (tail to head)
  for (let i = state.snake.length - 1; i >= 1; i--) {
    drawSnakeBody(ctx, state.snake[i].x, state.snake[i].y, i, state.snake.length);
  }

  // Draw snake head
  if (state.snake.length > 0) {
    drawSnakeHead(ctx, state.snake[0].x, state.snake[0].y, state.direction);
  }

  // Draw particles
  drawParticles(ctx);

  // Invincibility glow effect
  if (state.invincibleUntil > performance.now()) {
    ctx.strokeStyle = 'rgba(152,216,200,' + (0.3 + Math.sin(state.frameCount * 0.2) * 0.2) + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, canvasW - 2, canvasH - 2);
  }
}

// ============================================================
//  INPUT HANDLING
// ============================================================
function setDirection(dir) {
  if (state.gameState !== 'playing') return;
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (dir !== opposites[state.direction]) {
    state.nextDirection = dir;
  }
}

// D-Pad button event binding (mobile)
function setupDpad() {
  const dpadMap = {
    dpadUp: 'up', dpadDown: 'down', dpadLeft: 'left', dpadRight: 'right',
  };
  Object.entries(dpadMap).forEach(([id, dir]) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    // Touch events
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setDirection(dir);
    }, { passive: false });
    // Mouse fallback (dev tools / hybrid devices)
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      setDirection(dir);
    });
  });
  // Pause button
  const pauseDpad = document.getElementById('dpadPause');
  if (pauseDpad) {
    pauseDpad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      togglePause();
    }, { passive: false });
    pauseDpad.addEventListener('click', (e) => {
      e.preventDefault();
      togglePause();
    });
  }
}
setupDpad();

document.addEventListener('keydown', (e) => {
  // Space / Enter to start on start screen
  if (state.gameState === 'start') {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      startGame();
      return;
    }
  }

  // Space / P / Escape to toggle pause during gameplay
  if (e.key === ' ' || e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    e.preventDefault();
    if (state.gameState === 'playing' || state.gameState === 'paused') {
      togglePause();
    }
    return;
  }

  const keyMap = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
  };
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    setDirection(dir);
  }
});

// Touch steering on canvas — continuous drag to change direction
let touchActive = false;
let lastTurnX = 0, lastTurnY = 0;
const TURN_THRESHOLD = 25; // px to trigger direction change

function touchToDirection(dx, dy) {
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < TURN_THRESHOLD) return null;
  if (absDx > absDy) {
    return dx > 0 ? 'right' : 'left';
  } else {
    return dy > 0 ? 'down' : 'up';
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.gameState === 'start') {
    startGame();
    return;
  }
  if (state.gameState !== 'playing') return;
  const tx = e.touches[0].clientX;
  const ty = e.touches[0].clientY;
  lastTurnX = tx;
  lastTurnY = ty;
  touchActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (!touchActive) return;
  e.preventDefault();
  if (state.gameState !== 'playing') return;
  const tx = e.touches[0].clientX;
  const ty = e.touches[0].clientY;
  const dir = touchToDirection(tx - lastTurnX, ty - lastTurnY);
  if (dir) {
    setDirection(dir);
    lastTurnX = tx;
    lastTurnY = ty;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (!touchActive) return;
  touchActive = false;
  if (state.gameState !== 'playing') return;
  // Final direction check for quick flicks
  const tx = e.changedTouches[0].clientX;
  const ty = e.changedTouches[0].clientY;
  const dir = touchToDirection(tx - lastTurnX, ty - lastTurnY);
  if (dir) setDirection(dir);
});

canvas.addEventListener('touchcancel', () => {
  touchActive = false;
});

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  state.frameCount++;

  if (state.gameState === 'playing') {
    update();
    updateParticles();
    updateScoreDisplay();

    // Check combo decay for UI
    if (state.comboCount > 1 && performance.now() - state.lastEatTime > CONFIG.COMBO_WINDOW) {
      state.comboCount = 0;
      updateScoreDisplay();
    }
  }

  if (canvas.width > 0) {
    render();
  }

  requestAnimationFrame(gameLoop);
}

// No auto-pause on blur — only explicit pause via button or keypress

// ============================================================
//  MOBILE DETECTION & UI UPDATE
// ============================================================
function isMobileDevice() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ||
    ('ontouchstart' in window && window.innerWidth < 768);
}

function updateMobileUI() {
  const mobile = isMobileDevice();
  mobileControls.style.display = mobile ? 'block' : 'none';
  const hint = document.getElementById('controlsHint');
  if (hint) {
    hint.innerHTML = mobile
      ? '👆 手指拖动改变方向 &nbsp;|&nbsp; <kbd>⏯</kbd> 暂停'
      : '⌨️ 方向键/WASD 移动 &nbsp;|&nbsp; <kbd>空格</kbd> 暂停';
  }
}

// ============================================================
//  INITIALIZATION
// ============================================================
function init() {
  // Load high score
  try {
    const saved = localStorage.getItem('duomiSnakeHighScore');
    if (saved) state.highScore = parseInt(saved, 10) || 0;
  } catch(e) {}

  resizeCanvas();
  updateScoreDisplay();
  initSnake();

  // Show start screen
  startScreen.classList.remove('hidden');
  gameOverScreen.classList.add('hidden');
  pauseOverlay.classList.add('hidden');

  // Render cat previews for selection cards
  renderCatLogo(state.catType);
  renderCatPreview('previewTabby', 'tabby');
  renderCatPreview('previewOrange', 'orange');
  renderCatPreview('previewCalico', 'calico');

  // Detect mobile and update UI
  updateMobileUI();

  // Draw initial state
  if (canvas.width > 0 && state.snake.length > 0) {
    drawGrid();
    drawSnakeHead(ctx, state.snake[0].x, state.snake[0].y, state.direction);
    for (let i = 1; i < state.snake.length; i++) {
      drawSnakeBody(ctx, state.snake[i].x, state.snake[i].y, i, state.snake.length);
    }
  }

  // Start game loop
  requestAnimationFrame(gameLoop);
}

// Handle window resize (debounced)
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resizeCanvas();
    updateMobileUI();
  }, 150);
});

// Also observe container size changes (e.g., orientation change on mobile)
if (window.ResizeObserver) {
  new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => resizeCanvas(), 150);
  }).observe(container);
}

// Start
init();
</script>
